; ============================================================
; DreamHost FastCGI — per-directory PHP configuration
; Place this file in public/ (the document root).
; These settings apply to all PHP requests served from here.
; ============================================================

; --- OPcache --------------------------------------------------
; Cache compiled PHP bytecode so files are not re-parsed on
; every request. This is the single biggest performance win
; for a Laravel/Filament app on shared hosting.
opcache.enable=1
opcache.revalidate_freq=60

; --- PHP limits -----------------------------------------------
; Extra headroom for Filament's heavy boot + AI streaming calls.
max_execution_time=60
memory_limit=256M

; --- Session --------------------------------------------------
; Run session GC on ~1% of requests instead of every request.
session.gc_probability=1
session.gc_divisor=100
