models:
  User:
    username: string unique
    name: string
    email: string unique
    email_verified_at: nullable timestamp
    password: nullable string
    is_system: boolean default:false
    remember_token: nullable string:100
    softDeletes: softDeletes

  Subject:
    name: string unique
    archived_at: nullable timestamp

  SubjectGrade:
    subject_id: id foreign:subjects
    grade: integer
    subject_admin_user_id: nullable id foreign:users
    indexes:
      - unique: subject_id,grade

  SubjectGradeUser:
    subject_grade_id: id foreign:subject_grades
    user_id: id foreign:users
    role: enum:editor
    indexes:
      - unique: subject_grade_id,user_id

  LessonPlanFamily:
    subject_grade_id: id foreign:subject_grades
    day: string
    language: string:5
    official_version_id: nullable id foreign:lesson_plan_versions
    indexes:
      - unique: subject_grade_id,day,language

  LessonPlanVersion:
    lesson_plan_family_id: id foreign:lesson_plan_families
    contributor_id: id foreign:users
    version: string:20
    content: longText
    revision_note: nullable text
    indexes:
      - unique: lesson_plan_family_id,version

  Favorite:
    user_id: id foreign:users
    lesson_plan_family_id: id foreign:lesson_plan_families
    lesson_plan_version_id: id foreign:lesson_plan_versions
    indexes:
      - unique: user_id,lesson_plan_family_id

  Message:
    from_user_id: id foreign:users
    to_user_id: id foreign:users
    subject: string
    body: text
    read_at: nullable timestamp

  DeletionRequest:
    lesson_plan_version_id: id foreign:lesson_plan_versions
    requested_by_user_id: id foreign:users
    reason: nullable text
    resolved_at: nullable timestamp
    resolved_by_user_id: nullable id foreign:users
